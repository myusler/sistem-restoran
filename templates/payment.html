<style>
.menu-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px; /* jarak antara card */
  padding: 20px;
}

/* Card resit item */
.card {
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 15px;
  width: 220px;
  text-align: center;
  font-size: 16px;

  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  transition: 0.2s;
}

/* Hover effect */
.card:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

/* Text item */
.card p {
  margin: 5px 0;
}

/* Total besar */
.total {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  margin-top: 20px;
}

/* Button */
button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  opacity: 0.8;
}

.print-btn {
  background: #4CAF50;
  color: white;
}

.clear-btn {
  background: #f44336;
  color: white;
}
</style>


<hr>

<h1>Payment</h1>
<nav>
  <a href="/">Menu</a>
  <a href="/kitchen">Kitchen</a>
  <a href="/payment">Payment</a>
  <a href="/admin">Admin</a>
</nav>

<div class="menu-container">
  {% for order in orders %}
  <div class="card">
      <p>{{ order.item_name }} x{{ order.qty }}</p>
      <p>RM {{ '%.2f' % order.subtotal }}</p>
  </div>
  {% endfor %}
</div>

<h2 style="text-align:center;">Total: RM {{ '%.2f' % total }}</h2>

<div style="text-align:center; margin-top:20px;">
  <button onclick="window.print()">Print</button>
  <a href="/clear"><button class="delete">Clear</button></a>
</div>
